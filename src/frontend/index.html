<!DOCTYPE html>
<html lang="en" data-density="comfortable" data-tone="cream" data-photos="on">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily AI Times</title>
    <meta name="description" content="Top AI-curated news articles featuring the latest developments in artificial intelligence, machine learning, and technology research.">

    <!-- Prevent caching of all content -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Last-Modified" content="Thu, 01 Jan 1970 00:00:00 GMT">
    <meta http-equiv="If-Modified-Since" content="Thu, 01 Jan 1970 00:00:00 GMT">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,800;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Theme: apply saved/system preference before paint to avoid a flash -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('dat_theme');
                var theme = saved || (window.matchMedia &&
                    window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                document.documentElement.setAttribute('data-theme', theme);
            } catch (e) { /* localStorage may be unavailable */ }
        })();
    </script>

    <!-- Styles -->
    <link rel="stylesheet" href="styles/newspaper.css">

    <!-- Google tag (gtag.js) - Will be injected during build -->
    <!-- __GOOGLE_ANALYTICS__ -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=__GOOGLE_ANALYTICS__"></script>
    <script>
        if ('__GOOGLE_ANALYTICS__' && '__GOOGLE_ANALYTICS__'.startsWith('G-')) {
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', '__GOOGLE_ANALYTICS__', {
                page_title: 'Daily AI Times',
                page_location: window.location.href,
                send_page_view: true,
                custom_map: {'custom_parameter_1': 'ai_news_site'}
            });
            gtag('event', 'page_view', {
                page_title: 'Daily AI Times - Daily AI News',
                page_location: window.location.href
            });
        } else {
            console.log('Google Analytics not configured - placeholder not replaced');
        }
    </script>
    <!-- __GOOGLE_ANALYTICS__ -->

    <!-- Microsoft Clarity tracking script -->
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "s28j9x4a7i");
    </script>
</head>
<body>
    <div id="root"></div>
    <div id="modal-root"></div>
    <script type="module" src="components/app.js"></script>
</body>
</html>
