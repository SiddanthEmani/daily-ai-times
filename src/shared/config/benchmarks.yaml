# When updating "benchmarks": check https://lmarena.ai (Chatbot Arena Elo) or
# https://artificialanalysis.ai/leaderboards/models for current standings.
# When updating "capex": check the most recent 10-Q/10-K capex disclosures or
# a tracker such as https://www.visualcapitalist.com for the four hyperscalers.

