version: "1.0"
description: "Daily AI Times v2 provider registry (Claude Agent SDK era)"

providers:
  groq:
    env_key: GROQ_API_KEY
    required: false
    models:
      - id: llama-3.1-8b-instant
        tpm: 6000
        tier: bulk
      - id: gemma2-9b-it
        tpm: 15000
        tier: bulk
      - id: llama3-8b-8192
        tpm: 6000
        tier: bulk
      - id: meta-llama/llama-4-scout-17b-16e-instruct
        tpm: 30000
        tier: deep
      - id: llama-3.3-70b-versatile
        tpm: 12000
        tier: deep

  cerebras:
    env_key: CEREBRAS_API_KEY
    required: false
    models:
      - id: llama3.1-8b
        tpm: 60000
        tier: bulk
      - id: llama-3.3-70b
        tpm: 60000
        tier: deep

  openai:
    env_key: OPENAI_API_KEY
    required: false
    models:
      - id: gpt-4o-mini
        tpm: 200000
        tier: bulk
      - id: gpt-4o
        tpm: 30000
        tier: deep

  gemini:
    env_key: GEMINI_API_KEY
    required: false
    models:
      - id: gemini-2.5-flash
        tpm: 250000
        tier: bulk
      - id: gemini-2.5-pro
        tpm: 32000
        tier: deep

routing:
  tiers:
    bulk:
      description: "High-volume scoring and classification across 100-article batches"
      preferred_providers: ["cerebras", "groq", "gemini", "openai"]
      default_max_tokens: 1024
      default_temperature: 0.2
    deep:
      description: "Fact-check, bias, impact, final consensus for top candidates"
      preferred_providers: ["openai", "gemini", "groq", "cerebras"]
      default_max_tokens: 4000
      default_temperature: 0.3

  retries:
    attempts: 3
    backoff: exponential
    initial_delay_ms: 500
