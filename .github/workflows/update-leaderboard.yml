# Refreshes the slow-changing sidebar chart data: the benchmark leaderboard
# (Artificial Analysis API) and the data center capex chart (keyless SEC EDGAR
# API + committed curated figures). Kept in one workflow because both are daily,
# lightweight, stdlib-only collectors that commit JSON under src/frontend/api/.
name: Update Benchmark Leaderboard

on:
  schedule:
    - cron: '0 6 * * *'  # Once daily - the model leaderboard changes slowly and this stays within Artificial Analysis' free-tier limits
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-leaderboard
  cancel-in-progress: false

jobs:
  update-leaderboard:
    name: 🏆 Refresh Benchmark Leaderboard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🏆 Fetch model leaderboard
      env:
        ARTIFICIAL_ANALYSIS_API_KEY: ${{ secrets.ARTIFICIAL_ANALYSIS_API_KEY }}
      run: python3 src/backend/collectors/leaderboard_collector.py

    - name: 🏢 Fetch data center capex
      run: python3 src/backend/collectors/capex_collector.py

    - name: 💾 Commit chart data
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        for f in src/frontend/api/leaderboard.json src/frontend/api/capex.json; do
          [ -f "$f" ] && git add "$f"
        done

        if git diff --staged --quiet; then
          echo "No chart data changes to commit"
        else
          git commit -m "📊 Update sidebar chart data - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "Chart data committed and pushed"
        fi
