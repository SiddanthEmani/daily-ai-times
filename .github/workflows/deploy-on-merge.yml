name: Deploy on PR Merge

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare site
      run: |
        mkdir -p site/
        cp -r src/frontend/* site/

        if [ -f "site/index.html" ]; then
          if [ -n "${{ secrets.GOOGLE_ANALYTICS_ID }}" ]; then
            sed -i "s|__GOOGLE_ANALYTICS__|${{ secrets.GOOGLE_ANALYTICS_ID }}|g" site/index.html
          else
            sed -i '/<!-- __GOOGLE_ANALYTICS__ -->/,/<!-- __GOOGLE_ANALYTICS__ -->/d' site/index.html
          fi

          if [ -n "${{ secrets.COLLECTOR_URL }}" ]; then
            sed -i "s|__COLLECTOR_URL__|${{ secrets.COLLECTOR_URL }}|g" site/index.html
          else
            sed -i "s|__COLLECTOR_URL__||g" site/index.html
          fi
        fi

        # Refresh syndication artifacts from whatever API content is committed.
        python3 src/backend/api/generate_feed.py site || echo "feed generation skipped"

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
      with:
        timeout: 600000
