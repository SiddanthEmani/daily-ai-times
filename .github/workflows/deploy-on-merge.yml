name: Deploy on PR Merge

on:
  push:
    branches:
      - main
  # update-ticker.yml commits straight to main using the default GITHUB_TOKEN,
  # and pushes authenticated that way don't trigger other workflows' `push`
  # events (GitHub suppresses it to avoid recursive runs). Without this,
  # fresh ticker.json data lands on main but the site never redeploys with
  # it. workflow_run isn't subject to that suppression, so it picks up the
  # gap.
  workflow_run:
    workflows:
      - Update Market Ticker
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment:
      name: github-pages
      url: ${{ steps.deploy_1.outputs.page_url || steps.deploy_2.outputs.page_url || steps.deploy_3.outputs.page_url }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Prepare site
      run: |
        mkdir -p site/
        cp -r src/frontend/* site/

        if [ -f "site/index.html" ]; then
          if [ -n "${{ secrets.GOOGLE_ANALYTICS_ID }}" ]; then
            sed -i "s|__GOOGLE_ANALYTICS__|${{ secrets.GOOGLE_ANALYTICS_ID }}|g" site/index.html
          else
            sed -i '/<!-- __GOOGLE_ANALYTICS__ -->/,/<!-- __GOOGLE_ANALYTICS__ -->/d' site/index.html
          fi
        fi

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: site

    # actions/deploy-pages intermittently fails with "Deployment failed, try
    # again later" — a transient error from GitHub's Pages backend on that
    # specific deployment ID, not something a retried status poll can recover
    # from. Each attempt below creates a brand-new deployment, which is what
    # actually resolves it.
    - name: Deploy to GitHub Pages (attempt 1)
      id: deploy_1
      uses: actions/deploy-pages@v4
      continue-on-error: true
      with:
        timeout: 600000

    - name: Wait before retry 1
      if: steps.deploy_1.outcome == 'failure'
      run: sleep 15

    - name: Deploy to GitHub Pages (attempt 2)
      id: deploy_2
      if: steps.deploy_1.outcome == 'failure'
      uses: actions/deploy-pages@v4
      continue-on-error: true
      with:
        timeout: 600000

    - name: Wait before retry 2
      if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
      run: sleep 30

    - name: Deploy to GitHub Pages (attempt 3)
      id: deploy_3
      if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
      uses: actions/deploy-pages@v4
      with:
        timeout: 600000
