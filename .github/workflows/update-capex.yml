name: Update Data Center Capex

on:
  schedule:
    - cron: '0 7 * * 1'  # Weekly (Monday) - SEC filings are quarterly and the curated figures change occasionally, so a weekly refresh is plenty
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-capex
  cancel-in-progress: false

jobs:
  update-capex:
    name: 🏗️ Refresh Data Center Capex
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: 📦 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🏗️ Fetch data center capex
      run: python3 src/backend/collectors/capex_collector.py

    - name: 💾 Commit capex data
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if [ -f src/frontend/api/capex.json ]; then
          git add src/frontend/api/capex.json
        fi

        if git diff --staged --quiet; then
          echo "ℹ️ No capex changes to commit"
        else
          git commit -m "🏗️ Update data center capex - $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git push
          echo "✅ Capex data committed and pushed"
        fi
